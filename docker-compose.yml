version: '3.8'

services:
  memos:
    image: neosmemo/memos:latest
    container_name: memos
    ports:
      - "5230:5230"
    volumes:
      - memos-data:/var/opt/memos
    restart: unless-stopped

  memos-ui:
    image: memos-ui:latest
    container_name: memos-ui
    ports:
      - "8080:80"
    environment:
      - BACKEND_URL=http://memos:5230
      - BACKEND_GRPC=grpc://memos:5230
    depends_on:
      - memos
    restart: unless-stopped

volumes:
  memos-data:
